name: CI & Release

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:

permissions:
  contents: read

jobs:
  # ---------------------------------------------------------------------------
  # 1. Test both layers: the zero-dep Rust core and the scikit-learn binding.
  # ---------------------------------------------------------------------------
  test:
    name: Test (Rust core + Python binding)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Test the Rust core (offline, std-only)
        run: cargo test --release

      - name: Build & install the Python extension
        run: |
          pip install maturin pytest numpy scikit-learn
          maturin build --release --features python --out dist
          pip install cvdt --no-index --find-links dist

      - name: Run the Python (scikit-learn) test suite
        run: pytest -q tests/test_sklearn.py

  # ---------------------------------------------------------------------------
  # 2. On a tag, verify the tag matches the version in pyproject / Cargo.
  #    Fails fast so a mistyped tag never ships a mismatched release.
  # ---------------------------------------------------------------------------
  check-version:
    name: Verify tag matches package version
    if: startsWith(github.ref, 'refs/tags/v')
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Compare tag against pyproject.toml and Cargo.toml
        run: |
          tag="${GITHUB_REF_NAME#v}"
          py=$(grep -m1 '^version' pyproject.toml | sed -E 's/.*"([^"]+)".*/\1/')
          rs=$(grep -m1 '^version' Cargo.toml     | sed -E 's/.*"([^"]+)".*/\1/')
          echo "tag=$tag  pyproject=$py  cargo=$rs"
          if [ "$tag" != "$py" ] || [ "$tag" != "$rs" ]; then
            echo "::error::Tag ($tag) does not match pyproject ($py) / Cargo ($rs)"
            exit 1
          fi

  # ---------------------------------------------------------------------------
  # 3. Build abi3 wheels across platforms/arches. abi3-py38 means one wheel
  #    per (os, arch) covers every CPython >= 3.8, so no python-version matrix.
  # ---------------------------------------------------------------------------
  build:
    name: Wheel — ${{ matrix.platform.os }} / ${{ matrix.platform.target }}
    needs: test
    runs-on: ${{ matrix.platform.os }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - { os: ubuntu-latest,  target: x86_64 }
          - { os: ubuntu-latest,  target: aarch64 }
          - { os: macos-latest,   target: x86_64 }
          - { os: macos-latest,   target: aarch64 }
          - { os: windows-latest, target: x64 }
    steps:
      - uses: actions/checkout@v4
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.platform.target }}
          args: --release --out dist --features python
          manylinux: auto
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.platform.os }}-${{ matrix.platform.target }}
          path: dist

  sdist:
    name: Source distribution
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist
      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist

  # ---------------------------------------------------------------------------
  # 4. Publish to PyPI via Trusted Publishing (OIDC) — no stored API token.
  #    Only runs on a version tag, only after tests + version check pass.
  # ---------------------------------------------------------------------------
  release:
    name: Publish to PyPI
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [check-version, build, sdist]
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write   # required for Trusted Publishing (OIDC)
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - uses: pypa/gh-action-pypi-publish@release/v1
